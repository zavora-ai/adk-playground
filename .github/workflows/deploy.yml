name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'playground/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          # Find the running playground instance
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=adk-playground" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[0].InstanceId' --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No running instance found — ASG will pick up changes on next boot"
            exit 0
          fi

          echo "Deploying to $INSTANCE_ID..."
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions deploy $(date -u +%Y%m%d-%H%M%S)" \
            --parameters '{"commands":["export PATH=/root/.cargo/bin:$PATH && cd /opt/playground && git pull origin main 2>&1 && cd playground/backend && cargo build --release 2>&1 && systemctl restart adk-playground && echo DEPLOY_DONE"]}' \
            --timeout-seconds 600 \
            --query 'Command.CommandId' --output text)

          echo "SSM Command: $CMD_ID"

          # Poll for completion
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "  [$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy successful"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
          done
          echo "Timed out waiting for deploy"
          exit 1
