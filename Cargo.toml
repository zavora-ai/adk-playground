[workspace]
resolver = "2"
members = [
    "examples",
    "examples/audio",
    "examples/ralph",
    "examples/postgres_session",
    "examples/redis_session",
    "examples/mongodb_session",
    "examples/neo4j_session",
    "examples/sqlite_memory",
    "docs_examples/quickstart_test",
    "docs_examples/agents/llm_agent_test",
    "docs_examples/agents/graph_agent_test",
    "docs_examples/agents/multi_agent_test",
    "docs_examples/agents/realtime_agent_test",
    "docs_examples/agents/workflow_test",
    "docs_examples/tools/mcp_test",
    "docs_examples/tools/rag_test",
    "docs_examples/tools/browser_test",
    "docs_examples/tools/builtin_test",
    "docs_examples/tools/function_tools_test",
    "docs_examples/tools/ui_test",
    "docs_examples/sessions/sessions_test",
    "docs_examples/callbacks/callbacks_test",
    "docs_examples/artifacts/artifacts_test",
    "docs_examples/events/events_test",
    "docs_examples/observability/telemetry_test",
    "docs_examples/deployment/launcher_test",
    "docs_examples/deployment/a2a_test",
    "docs_examples/evaluation/eval_test",
    "docs_examples/security/auth_test",
    "docs_examples/security/guardrails_test",
    "docs_examples/security/memory_test",
    "docs_examples/core/core_test",
    "docs_examples/core/runner_test",
    "docs_examples/cli/cli_test",
    "docs_examples/eval/eval_readme_test",
    "docs_examples/graph/graph_readme_test",
    "docs_examples/guardrail/guardrail_readme_test",
    "docs_examples/realtime/realtime_readme_test",
    "docs_examples/readme_validation",
    "docs_examples/models/providers_test",
]

[workspace.package]
version = "0.4.0"
edition = "2024"
rust-version = "1.85.0"
license = "Apache-2.0"
authors = ["James Karanja Maina <james.karanja@zavora.ai>"]
homepage = "https://www.zavora.ai"
repository = "https://github.com/zavora-ai/adk-playground"

[workspace.dependencies]
# External dependencies
tokio = { version = "1.40", features = ["full"] }
tokio-stream = "0.1"
async-trait = "0.1"
futures = "0.3"
async-stream = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
anyhow = "1.0"
uuid = { version = "1.10", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
regex = "1.10"
tracing = "0.1"
tracing-subscriber = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
sha2 = "0.10"
hex = "0.4"
flate2 = "1.0"
tar = "0.4"

# ADK crates from local sister project
adk-core = { path = "../adk-rust/adk-core" }
adk-agent = { path = "../adk-rust/adk-agent" }
adk-model = { path = "../adk-rust/adk-model" }
adk-tool = { path = "../adk-rust/adk-tool" }
adk-runner = { path = "../adk-rust/adk-runner" }
adk-server = { path = "../adk-rust/adk-server" }
adk-session = { path = "../adk-rust/adk-session" }
adk-artifact = { path = "../adk-rust/adk-artifact" }
adk-memory = { path = "../adk-rust/adk-memory" }
adk-cli = { path = "../adk-rust/adk-cli" }
adk-realtime = { path = "../adk-rust/adk-realtime" }
adk-graph = { path = "../adk-rust/adk-graph" }
adk-browser = { path = "../adk-rust/adk-browser" }
adk-eval = { path = "../adk-rust/adk-eval" }
adk-ui = { path = "../adk-ui" }
adk-telemetry = { path = "../adk-rust/adk-telemetry" }
adk-guardrail = { path = "../adk-rust/adk-guardrail" }
adk-auth = { path = "../adk-rust/adk-auth" }
adk-plugin = { path = "../adk-rust/adk-plugin" }
adk-skill = { path = "../adk-rust/adk-skill" }
adk-gemini = { path = "../adk-rust/adk-gemini" }
adk-code = { path = "../adk-rust/adk-code" }
adk-sandbox = { path = "../adk-rust/adk-sandbox" }
adk-doc-audit = { path = "../adk-rust/adk-doc-audit" }
adk-rag = { path = "../adk-rust/adk-rag" }
adk-audio = { path = "../adk-rust/adk-audio" }
adk-deploy = { path = "../adk-rust/adk-deploy" }
adk-rust = { path = "../adk-rust/adk-rust", default-features = false }

[patch."https://github.com/zavora-ai/adk-rust"]
adk-core = { path = "../adk-rust/adk-core" }
adk-agent = { path = "../adk-rust/adk-agent" }
adk-model = { path = "../adk-rust/adk-model" }
adk-tool = { path = "../adk-rust/adk-tool" }
adk-runner = { path = "../adk-rust/adk-runner" }
adk-server = { path = "../adk-rust/adk-server" }
adk-session = { path = "../adk-rust/adk-session" }
adk-artifact = { path = "../adk-rust/adk-artifact" }
adk-memory = { path = "../adk-rust/adk-memory" }
adk-cli = { path = "../adk-rust/adk-cli" }
adk-realtime = { path = "../adk-rust/adk-realtime" }
adk-graph = { path = "../adk-rust/adk-graph" }
adk-browser = { path = "../adk-rust/adk-browser" }
adk-eval = { path = "../adk-rust/adk-eval" }
adk-ui = { path = "../adk-ui" }
adk-telemetry = { path = "../adk-rust/adk-telemetry" }
adk-guardrail = { path = "../adk-rust/adk-guardrail" }
adk-auth = { path = "../adk-rust/adk-auth" }
adk-plugin = { path = "../adk-rust/adk-plugin" }
adk-skill = { path = "../adk-rust/adk-skill" }
adk-gemini = { path = "../adk-rust/adk-gemini" }
adk-code = { path = "../adk-rust/adk-code" }
adk-sandbox = { path = "../adk-rust/adk-sandbox" }
adk-doc-audit = { path = "../adk-rust/adk-doc-audit" }
adk-rag = { path = "../adk-rust/adk-rag" }
adk-audio = { path = "../adk-rust/adk-audio" }
adk-deploy = { path = "../adk-rust/adk-deploy" }
adk-rust = { path = "../adk-rust/adk-rust" }

[profile.dev]
debug = 1
split-debuginfo = "packed"
incremental = true
opt-level = 0

[profile.dev.package."*"]
opt-level = 1
debug = false

[profile.release]
strip = true
opt-level = 3
lto = true
