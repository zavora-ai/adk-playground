AWSTemplateFormatVersion: '2010-09-09'
Description: ADK-Rust Playground - On-demand ARM + CloudFront + ACM

Parameters:
  GoogleApiKey:
    Type: String
    NoEcho: true
    Default: ''
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ''
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Default: ''
  DeepSeekApiKey:
    Type: String
    NoEcho: true
    Default: ''
  MistralApiKey:
    Type: String
    NoEcho: true
    Default: ''
  XAIApiKey:
    Type: String
    NoEcho: true
    Default: ''
  OpenRouterApiKey:
    Type: String
    NoEcho: true
    Default: ''
  InstanceType:
    Type: String
    Default: t4g.medium
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets (pick 2+)
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
  DomainName:
    Type: String
    Default: playground.adk-rust.com
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Default: Z01737562QY7O0WZZDEQW
  KeyPairName:
    Type: String
    Default: ''
  GitHubRepo:
    Type: String
    Default: https://github.com/zavora-ai/adk-playground.git

Resources:
  # --- Networking ---
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ADK Playground
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        # Only CloudFront can reach the backend
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourcePrefixListId: pl-3b927c52  # com.amazonaws.global.cloudfront.origin-facing
        - {IpProtocol: tcp, FromPort: 22, ToPort: 22, CidrIp: 0.0.0.0/0}

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  # --- Route53: origin subdomain → EIP ---
  OriginDNS:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub 'origin-playground.adk-rust.com'
      Type: A
      TTL: '60'
      ResourceRecords:
        - !Ref ElasticIP

  # --- ACM Certificate (auto-validated via Route53) ---
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  # --- CloudFront ---
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: ADK-Rust Playground
        Aliases: [!Ref DomainName]
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultCacheBehavior:
          TargetOriginId: ec2-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          Compress: true
        Origins:
          - Id: ec2-origin
            DomainName: origin-playground.adk-rust.com
            CustomOriginConfig:
              HTTPPort: 8080
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 60
        HttpVersion: http2and3
        PriceClass: PriceClass_100
    DependsOn: OriginDNS

  # --- Route53: playground.adk-rust.com → CloudFront ---
  PlaygroundDNS:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (global constant)

  # --- IAM ---
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: AssociateEIP
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [ec2:AssociateAddress, ec2:DescribeAddresses]
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  # --- EC2 Launch Template ---
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: adk-playground
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        SecurityGroupIds: [!Ref SecurityGroup]
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs: {VolumeSize: 30, VolumeType: gp3, DeleteOnTermination: true}
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -eo pipefail
            export HOME=/root
            exec > /var/log/adk-setup.log 2>&1
            echo "=== ADK Playground Setup $(date) ==="

            INSTANCE_ID=$(ec2-metadata -i | cut -d' ' -f2)
            aws ec2 associate-address --instance-id "$INSTANCE_ID" --allocation-id "${ElasticIP.AllocationId}" --region ${AWS::Region} || true

            fallocate -l 4G /swapfile && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile
            echo '/swapfile swap swap defaults 0 0' >> /etc/fstab

            dnf update -y
            dnf install -y gcc openssl-devel pkg-config git dbus-devel docker
            systemctl enable --now docker
            usermod -aG docker root

            mkdir -p /usr/local/lib/docker/cli-plugins
            curl -sL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-aarch64" -o /usr/local/lib/docker/cli-plugins/docker-compose
            chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            export PATH="/root/.cargo/bin:$PATH"

            cd /opt
            git clone --depth 1 ${GitHubRepo} playground
            cd /opt/playground/playground/backend
            cargo build --release
            echo "=== Backend built ==="

            cat > /opt/playground/.env <<'ENVEOF'
            PLAYGROUND_MODE=public
            PORT=8080
            POSTGRES_URL=postgres://adk:adk_playground@localhost:5433/adk_sessions
            MONGODB_URL=mongodb://adk:adk_playground@localhost:27017
            NEO4J_URL=bolt://localhost:7687
            NEO4J_USER=neo4j
            NEO4J_PASS=adk_playground
            ENVEOF
            echo "GOOGLE_API_KEY=${GoogleApiKey}" >> /opt/playground/.env
            echo "OPENAI_API_KEY=${OpenAIApiKey}" >> /opt/playground/.env
            echo "ANTHROPIC_API_KEY=${AnthropicApiKey}" >> /opt/playground/.env
            echo "DEEPSEEK_API_KEY=${DeepSeekApiKey}" >> /opt/playground/.env
            echo "MISTRAL_API_KEY=${MistralApiKey}" >> /opt/playground/.env
            echo "XAI_API_KEY=${XAIApiKey}" >> /opt/playground/.env
            echo "OPENROUTER_API_KEY=${OpenRouterApiKey}" >> /opt/playground/.env
            cp /opt/playground/.env /opt/playground/playground/backend/.env

            cd /opt/playground/playground
            docker compose up -d
            echo "=== DB containers started ==="

            cat > /etc/systemd/system/adk-playground-update.service <<EOF
            [Unit]
            Description=ADK Playground - Git Pull & Build
            After=network-online.target
            Wants=network-online.target
            [Service]
            Type=oneshot
            Environment=PATH=/root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            WorkingDirectory=/opt/playground
            ExecStart=/bin/bash -c 'git pull origin main 2>&1 && cd playground && docker compose up -d 2>&1 && cd backend && cargo build --release 2>&1'
            TimeoutStartSec=600
            [Install]
            WantedBy=multi-user.target
            EOF

            cat > /etc/systemd/system/adk-playground.service <<EOF
            [Unit]
            Description=ADK Playground
            After=network.target adk-playground-update.service docker.service
            Requires=adk-playground-update.service docker.service
            [Service]
            Type=simple
            WorkingDirectory=/opt/playground/playground/backend
            EnvironmentFile=/opt/playground/.env
            Environment=PATH=/root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            ExecStart=/opt/playground/playground/backend/target/release/adk-playground-server
            Restart=always
            RestartSec=3
            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable adk-playground-update
            systemctl enable --now adk-playground

            echo "=== Pre-warming compilation cache ==="
            mkdir -p /var/tmp/adk-playground-workspace/src
            python3 -c "
            import textwrap, pathlib
            pathlib.Path('/var/tmp/adk-playground-workspace/Cargo.toml').write_text(textwrap.dedent('''
            [package]
            name = \"playground-run\"
            version = \"0.1.0\"
            edition = \"2024\"

            [dependencies]
            adk-rust = { version = \"0.5.0\", default-features = false, features = [\"full\", \"openai\", \"anthropic\", \"deepseek\", \"bedrock\", \"azure-ai\", \"openrouter\", \"postgres-session\", \"mongodb-session\", \"neo4j-session\"] }
            adk-tool = \"0.5.0\"
            adk-audio = { version = \"0.5.0\", default-features = false, features = [\"tts\"] }
            adk-realtime = { version = \"0.5.0\", default-features = false, features = [\"openai\", \"gemini\"] }
            adk-skill = \"0.5.0\"
            adk-plugin = \"0.5.0\"
            adk-code = \"0.5.0\"
            adk-sandbox = \"0.5.0\"
            adk-rag = \"0.5.0\"
            adk-core = \"0.5.0\"
            adk-model = \"0.5.0\"
            adk-agent = { version = \"0.5.0\", features = [\"guardrails\"] }
            adk-session = { version = \"0.5.0\", features = [\"encrypted-session\"] }
            adk-graph = \"0.5.0\"
            adk-anthropic = \"0.5.0\"
            adk-artifact = \"0.5.0\"
            adk-cli = \"0.5.0\"
            adk-guardrail = \"0.5.0\"
            adk-memory = \"0.5.0\"
            adk-auth = { version = \"0.5.0\", features = [\"sso\"] }
            adk-payments = { version = \"0.5.0\", features = [\"acp\"] }
            adk-action = \"0.5.0\"
            adk-telemetry = \"0.5.0\"
            chrono = { version = \"0.4\", features = [\"serde\"] }
            rustls = { version = \"0.23\", features = [\"ring\"] }
            tokio = { version = \"1\", features = [\"full\"] }
            serde = { version = \"1\", features = [\"derive\"] }
            serde_json = \"1\"
            schemars = \"0.8\"
            async-trait = \"0.1\"
            anyhow = \"1\"
            dotenvy = \"0.15\"
            base64 = \"0.22\"
            tracing-subscriber = { version = \"0.3\", features = [\"json\", \"env-filter\"] }
            sqlx = { version = \"0.8\", features = [\"runtime-tokio-rustls\", \"postgres\"] }
            mongodb = \"3\"
            neo4rs = \"0.8\"
            tempfile = \"3\"
            serde_yaml = \"0.9\"
            regex = \"1\"
            sha2 = \"0.10\"
            ''').strip())
            "
            cat > /var/tmp/adk-playground-workspace/src/main.rs <<'WARMEOF'
            use adk_rust::prelude::*;
            use adk_tool::tool;

            #[tool(description = "warm")]
            async fn warm_tool(input: String) -> adk_tool::Result<serde_json::Value> {
                Ok(serde_json::json!({"result": input}))
            }

            #[tokio::main]
            async fn main() -> anyhow::Result<()> {
                println!("warm");
                Ok(())
            }
            WARMEOF
            cd /var/tmp/adk-playground-workspace
            cargo build 2>&1 || true
            echo "=== Setup Complete $(date) ==="

  # --- ASG (on-demand, single instance) ---
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: '1'
      MaxSize: '1'
      DesiredCapacity: '1'
      VPCZoneIdentifier: !Ref SubnetIds
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      HealthCheckType: EC2
      HealthCheckGracePeriod: 900
      Tags:
        - Key: Name
          Value: adk-playground
          PropagateAtLaunch: true

Outputs:
  PlaygroundURL:
    Value: !Sub 'https://${DomainName}'
  CloudFrontDomain:
    Value: !GetAtt CloudFrontDistribution.DomainName
  ElasticIP:
    Value: !Ref ElasticIP
  CertificateArn:
    Value: !Ref Certificate
