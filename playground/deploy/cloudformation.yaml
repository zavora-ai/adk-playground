AWSTemplateFormatVersion: '2010-09-09'
Description: ADK-Rust Playground - Spot Instance on default VPC

Parameters:
  GoogleApiKey:
    Type: String
    NoEcho: true
    Default: ''

  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ''

  AnthropicApiKey:
    Type: String
    NoEcho: true
    Default: ''

  DeepSeekApiKey:
    Type: String
    NoEcho: true
    Default: ''

  MistralApiKey:
    Type: String
    NoEcho: true
    Default: ''

  XAIApiKey:
    Type: String
    NoEcho: true
    Default: ''

  OpenRouterApiKey:
    Type: String
    NoEcho: true
    Default: ''

  InstanceType:
    Type: String
    Default: t4g.medium

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into (use default VPC)

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets (pick 2+ from default VPC)

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64

  DomainName:
    Type: String
    Default: ''
    Description: Domain name for Caddy HTTPS (leave empty for IP-only access)

  KeyPairName:
    Type: String
    Default: ''
    Description: EC2 key pair name for SSH access (optional)

  GitHubRepo:
    Type: String
    Default: https://github.com/zavora-ai/adk-playground.git

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ADK Playground
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0}
        - {IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0}
        - {IpProtocol: tcp, FromPort: 22, ToPort: 22, CidrIp: 0.0.0.0/0}

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: AssociateEIP
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:AssociateAddress
                  - ec2:DescribeAddresses
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: adk-playground
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref SecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 30
              VolumeType: gp3
              DeleteOnTermination: true
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -eo pipefail
            export HOME=/root
            exec > /var/log/adk-setup.log 2>&1
            echo "=== ADK Playground Setup $(date) ==="

            INSTANCE_ID=$(ec2-metadata -i | cut -d' ' -f2)
            aws ec2 associate-address --instance-id "$INSTANCE_ID" --allocation-id "${ElasticIP.AllocationId}" --region ${AWS::Region} || true

            # Create 4GB swap to prevent OOM during compilation
            fallocate -l 4G /swapfile
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            echo '/swapfile swap swap defaults 0 0' >> /etc/fstab

            dnf update -y
            dnf install -y gcc openssl-devel pkg-config git dbus-devel

            # Install Docker
            dnf install -y docker
            systemctl enable --now docker
            usermod -aG docker root

            # Install Docker Compose plugin
            mkdir -p /usr/local/lib/docker/cli-plugins
            curl -sL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-aarch64" -o /usr/local/lib/docker/cli-plugins/docker-compose
            chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            export PATH="/root/.cargo/bin:$PATH"

            # Install Caddy from binary
            curl -sL "https://caddyserver.com/api/download?os=linux&arch=arm64" -o /usr/bin/caddy
            chmod +x /usr/bin/caddy
            mkdir -p /etc/caddy

            cd /opt
            git clone --depth 1 ${GitHubRepo} playground
            cd /opt/playground/playground/backend
            cargo build --release
            echo "=== Backend built ==="

            cat > /opt/playground/.env <<'ENVEOF'
            PLAYGROUND_MODE=public
            PORT=8080
            POSTGRES_URL=postgres://adk:adk_playground@localhost:5433/adk_sessions
            MONGODB_URL=mongodb://adk:adk_playground@localhost:27017
            NEO4J_URL=bolt://localhost:7687
            NEO4J_USER=neo4j
            NEO4J_PASS=adk_playground
            ENVEOF
            # Append API keys (these come from CloudFormation params, need !Sub)
            echo "GOOGLE_API_KEY=${GoogleApiKey}" >> /opt/playground/.env
            echo "OPENAI_API_KEY=${OpenAIApiKey}" >> /opt/playground/.env
            echo "ANTHROPIC_API_KEY=${AnthropicApiKey}" >> /opt/playground/.env
            echo "DEEPSEEK_API_KEY=${DeepSeekApiKey}" >> /opt/playground/.env
            echo "MISTRAL_API_KEY=${MistralApiKey}" >> /opt/playground/.env
            echo "XAI_API_KEY=${XAIApiKey}" >> /opt/playground/.env
            echo "OPENROUTER_API_KEY=${OpenRouterApiKey}" >> /opt/playground/.env
            # Also write to backend dir for cargo run during dev
            cp /opt/playground/.env /opt/playground/playground/backend/.env

            # Start database containers
            cd /opt/playground/playground
            docker compose up -d
            echo "=== DB containers started ==="

            # Update service: pulls latest code + rebuilds before playground starts
            cat > /etc/systemd/system/adk-playground-update.service <<EOF
            [Unit]
            Description=ADK Playground - Git Pull & Build
            After=network-online.target
            Wants=network-online.target
            [Service]
            Type=oneshot
            Environment=PATH=/root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            WorkingDirectory=/opt/playground
            ExecStart=/bin/bash -c 'git pull origin main 2>&1 && cd playground && docker compose up -d 2>&1 && cd backend && cargo build --release 2>&1'
            TimeoutStartSec=600
            [Install]
            WantedBy=multi-user.target
            EOF

            cat > /etc/systemd/system/adk-playground.service <<EOF
            [Unit]
            Description=ADK Playground
            After=network.target adk-playground-update.service docker.service
            Requires=adk-playground-update.service docker.service
            [Service]
            Type=simple
            WorkingDirectory=/opt/playground/playground/backend
            EnvironmentFile=/opt/playground/.env
            Environment=PATH=/root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            ExecStart=/opt/playground/playground/backend/target/release/adk-playground-server
            Restart=always
            RestartSec=3
            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable adk-playground-update
            systemctl enable --now adk-playground

            CADDY_DOMAIN="${DomainName}"
            if [ -n "$CADDY_DOMAIN" ]; then
              cat > /etc/caddy/Caddyfile <<CADDYEOF
            $CADDY_DOMAIN {
              reverse_proxy localhost:8080
            }
            CADDYEOF
            else
              cat > /etc/caddy/Caddyfile <<'CADDYEOF'
            :80 {
              reverse_proxy localhost:8080
            }
            CADDYEOF
            fi

            cat > /etc/systemd/system/caddy.service <<EOF
            [Unit]
            Description=Caddy
            After=network.target
            [Service]
            Type=simple
            ExecStart=/usr/bin/caddy run --config /etc/caddy/Caddyfile
            Restart=always
            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable --now caddy

            echo "=== Pre-warming compilation cache ==="
            mkdir -p /var/tmp/adk-playground-workspace/src
            python3 -c "
            import textwrap, pathlib
            pathlib.Path('/var/tmp/adk-playground-workspace/Cargo.toml').write_text(textwrap.dedent('''
            [package]
            name = \"playground-run\"
            version = \"0.1.0\"
            edition = \"2024\"

            [dependencies]
            adk-rust = { version = \"0.5.0\", default-features = false, features = [\"full\", \"openai\", \"anthropic\", \"deepseek\", \"bedrock\", \"azure-ai\", \"openrouter\", \"postgres-session\", \"mongodb-session\", \"neo4j-session\"] }
            adk-tool = \"0.5.0\"
            adk-audio = { version = \"0.5.0\", default-features = false, features = [\"tts\"] }
            adk-realtime = { version = \"0.5.0\", default-features = false, features = [\"openai\", \"gemini\"] }
            adk-skill = \"0.5.0\"
            adk-plugin = \"0.5.0\"
            adk-code = \"0.5.0\"
            adk-sandbox = \"0.5.0\"
            adk-rag = \"0.5.0\"
            adk-core = \"0.5.0\"
            adk-model = \"0.5.0\"
            adk-agent = { version = \"0.5.0\", features = [\"guardrails\"] }
            adk-session = { version = \"0.5.0\", features = [\"encrypted-session\"] }
            adk-graph = \"0.5.0\"
            adk-anthropic = \"0.5.0\"
            adk-artifact = \"0.5.0\"
            adk-cli = \"0.5.0\"
            adk-guardrail = \"0.5.0\"
            adk-memory = \"0.5.0\"
            adk-auth = { version = \"0.5.0\", features = [\"sso\"] }
            adk-payments = { version = \"0.5.0\", features = [\"acp\"] }
            adk-action = \"0.5.0\"
            adk-telemetry = \"0.5.0\"
            chrono = { version = \"0.4\", features = [\"serde\"] }
            rustls = { version = \"0.23\", features = [\"ring\"] }
            tokio = { version = \"1\", features = [\"full\"] }
            serde = { version = \"1\", features = [\"derive\"] }
            serde_json = \"1\"
            schemars = \"0.8\"
            async-trait = \"0.1\"
            anyhow = \"1\"
            dotenvy = \"0.15\"
            base64 = \"0.22\"
            tracing-subscriber = { version = \"0.3\", features = [\"json\", \"env-filter\"] }
            sqlx = { version = \"0.8\", features = [\"runtime-tokio-rustls\", \"postgres\"] }
            mongodb = \"3\"
            neo4rs = \"0.8\"
            tempfile = \"3\"
            serde_yaml = \"0.9\"
            regex = \"1\"
            sha2 = \"0.10\"
            ''').strip())
            "
            cat > /var/tmp/adk-playground-workspace/src/main.rs <<'WARMEOF'
            use adk_rust::prelude::*;
            use adk_tool::tool;

            #[tool(description = "warm")]
            async fn warm_tool(input: String) -> adk_tool::Result<serde_json::Value> {
                Ok(serde_json::json!({"result": input}))
            }

            #[tokio::main]
            async fn main() -> anyhow::Result<()> {
                println!("warm");
                Ok(())
            }
            WARMEOF
            cd /var/tmp/adk-playground-workspace
            cargo build 2>&1 || true
            echo "=== Setup Complete $(date) ==="

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: '1'
      MaxSize: '1'
      DesiredCapacity: '1'
      VPCZoneIdentifier: !Ref SubnetIds
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      HealthCheckType: EC2
      HealthCheckGracePeriod: 900
      Tags:
        - Key: Name
          Value: adk-playground
          PropagateAtLaunch: true

Outputs:
  PlaygroundURL:
    Value: !Sub 'http://${ElasticIP}'
  ElasticIP:
    Value: !Ref ElasticIP
  CostEstimate:
    Value: 'On-demand t4g.medium ~$24/mo + EBS $1.60/mo = ~$26/mo total'
